command_timeout = 5000
format = """
[вЦСвЦТвЦУ](#a3aed2)\

[$hostname ](bold bg:#769ff0 fg:#0000cd)\
[оВі](bg:#769ff0 fg:#a3aed2)\
$directory\
[оВі](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
[оВі](fg:#394260 bg:#212736)\

[оВі](fg:#212736 bg:#1d2230)\
$time\
[оВі ](fg:#1d2230)\
\n$character"""

add_newline = true

[character]
error_symbol = '[вАЉпЄПпЄП](bold red)'

[cmd_duration]
min_time = 5000
format = 'elapsed [$duration](bold orange)'

[hostname]
style = "bold fg:#0000cd bg:#769ff0"
ssh_only = false
format = "[$ssh_symbol](bold blue) [$hostname](bold orange)"
disabled = false

[directory]
style = "bold fg:#000000 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 5
truncation_symbol = "вА¶/"

[directory.substitutions]
"Documents" = "у∞ИЩ "
"Downloads" = "пАЩ "
"Music" = "пАБ "
"Pictures" = "пАЊ "

[git_branch]
symbol = "пРШ"
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#1d2230"
format = '[[ пРЇ $time ](fg:#a0a9cb bg:#1d2230)]($style)'
